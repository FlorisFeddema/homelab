{{- $cluster := index .Values "rook-ceph-cluster" -}}
{{- if $cluster.cephDashboardSSO.enabled }}
{{- $oidc := $cluster.cephDashboardSSO.oidc -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: rook-ceph-dashboard-security-policy
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: rook-ceph-dashboard
  oidc:
    provider:
      issuer: {{ $oidc.issuer }}
    redirectURL: {{ $oidc.redirectURL }}
    logoutPath: {{ $oidc.logoutPath }}
    clientID: {{ $oidc.clientID | quote }}
    clientSecret:
      name: ceph-dashboard-oidc-secret
    forwardAccessToken: true
  jwt:
    optional: true
    providers:
      - name: ceph-dashboard
        issuer: {{ $oidc.issuer }}
        audiences:
          - {{ $oidc.clientID | quote }}
        remoteJWKS:
          uri: {{ $oidc.jwksURL }}
        extractFrom:
          cookies:
            - BearerToken
        claimToHeaders:
          - header: X-User
            claim: {{ $oidc.usernameClaim | quote }}
          - header: X-Email
            claim: {{ $oidc.emailClaim | quote }}
          {{- if $oidc.groupsClaim }}
          - header: X-User-Groups
            claim: {{ $oidc.groupsClaim | quote }}
          - header: X-Forwarded-Groups
            claim: {{ $oidc.groupsClaim | quote }}
          {{- end }}
{{- end }}
