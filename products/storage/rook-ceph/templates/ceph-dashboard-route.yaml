{{- $cluster := index .Values "rook-ceph-cluster" -}}
{{- $route := $cluster.dashboardRoute -}}
{{- $dashboard := $cluster.cephClusterSpec.dashboard -}}
{{- if $route.host -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rook-ceph-dashboard
  namespace: {{ .Release.Namespace }}
  {{- with $route.labels }}
  labels:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  {{- with $route.annotations }}
  annotations:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  hostnames:
    - {{ $route.host.name | quote }}
  parentRefs:
    {{- $route.parentRefs | toYaml | nindent 4 }}
  rules:
    - backendRefs:
        - name: rook-ceph-mgr-dashboard
          {{- if $dashboard.port }}
          port: {{ $dashboard.port }}
          {{- else if $dashboard.ssl }}
          port: 8443
          {{- else }}
          port: 7000
          {{- end }}
      {{- if $cluster.cephDashboardSSO.enabled }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Access-Token
                value: "%REQ(Authorization)%"
              - name: X-Forwarded-Proto
                value: "https"
      {{- end }}
      matches:
        - path:
            type: {{ $route.host.pathType | default "PathPrefix" }}
            value: {{ $route.host.path | default "/" }}
{{- end }}
