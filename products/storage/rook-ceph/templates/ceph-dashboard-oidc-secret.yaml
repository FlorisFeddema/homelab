{{- $cluster := index .Values "rook-ceph-cluster" -}}
{{- if $cluster.cephDashboardSSO.enabled }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ceph-dashboard-oidc-secret
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    client-secret: {{ $cluster.cephDashboardSSO.sealedSecret.clientSecretSealed | quote }}
  template:
    metadata:
      name: ceph-dashboard-oidc-secret
      namespace: {{ .Release.Namespace }}
{{- end }}
