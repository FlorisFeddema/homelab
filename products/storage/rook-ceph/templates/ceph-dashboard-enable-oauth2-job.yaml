{{- $cluster := index .Values "rook-ceph-cluster" -}}
{{- if $cluster.cephDashboardSSO.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-dashboard-enable-oauth2
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: ceph-dashboard-enable-oauth2
      restartPolicy: Never
      containers:
        - name: enable-oauth2
          image: {{ $cluster.cephDashboardSSO.kubectl.image.repository }}:{{ $cluster.cephDashboardSSO.kubectl.image.tag }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          command:
            - sh
            - -c
            - |
              set -eu

              TOOLBOX_SELECTOR="app=rook-ceph-tools"
              TOOLBOX_CONTAINER="rook-ceph-tools"
              STATUS_EXPECTED='SSO is "enabled" with "oauth2" protocol.'

              echo "Waiting for toolbox pod (selector: ${TOOLBOX_SELECTOR})..."
              kubectl wait --for=condition=Ready pod -l "${TOOLBOX_SELECTOR}" --timeout=120s

              TOOLBOX_POD="$(kubectl get pod -l "${TOOLBOX_SELECTOR}" -o jsonpath='{.items[0].metadata.name}')"
              if [ -z "${TOOLBOX_POD}" ]; then
                echo "No toolbox pod found for selector ${TOOLBOX_SELECTOR}"
                exit 1
              fi

              echo "Using toolbox pod: ${TOOLBOX_POD}"

              status="$(kubectl exec "${TOOLBOX_POD}" -c "${TOOLBOX_CONTAINER}" -- ceph dashboard sso status 2>/dev/null || true)"
              if [ -n "${status}" ]; then
                echo "${status}"
              fi

              if printf '%s\n' "${status}" | grep -Fq "${STATUS_EXPECTED}"; then
                echo "OAuth2 SSO is already enabled."
                exit 0
              fi

              echo "Enabling OAuth2 SSO on Ceph Dashboard..."
              kubectl exec "${TOOLBOX_POD}" -c "${TOOLBOX_CONTAINER}" -- ceph dashboard sso enable oauth2

              echo "Verifying SSO is enabled..."
              kubectl exec "${TOOLBOX_POD}" -c "${TOOLBOX_CONTAINER}" -- ceph dashboard sso status | grep -F "${STATUS_EXPECTED}"

              echo "OAuth2 SSO enabled successfully."
{{- end }}
