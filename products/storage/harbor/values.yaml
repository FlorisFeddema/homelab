database:
  clusterName: harbor-postgres
  replicas: 2
  storageClass: ceph-block-nvme-1
  size: 5Gi

harbor:
  expose:
    type: route
    tls:
      enabled: false
    route:
      parentRefs:
        - name: envoy-gateway-public
          namespace: envoy-gateway
          sectionName: web-https
        - name: envoy-gateway-private
          namespace: envoy-gateway
          sectionName: web-https
      hosts:
        - harbor.feddema.dev

  externalURL: https://harbor.feddema.dev

  persistence:
    enabled: true
    persistentVolumeClaim:
      trivy:
        size: 5Gi
    imageChartStorage:
      disableredirect: true
      type: s3
      s3:
        existingSecret: "harbor-s3-credentials"
        region: 'eu'
        bucket: harbor
        regionendpoint: http://rook-ceph-rgw-ceph-object-nvme-2.rook-ceph.svc:80
        secure: false

  existingSecretAdminPassword: "harbor-credentials"
  existingSecretSecretKey: "harbor-credentials"

  ipFamily:
    ipv6:
      enabled: false

  logLevel: info

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  portal:
    nodeSelector:
      kubernetes.io/arch: amd64
    replicas: 2
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            component: portal
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    revisionHistoryLimit: 0

  core:
    secretName: "root-ca-tls"
    nodeSelector:
      kubernetes.io/arch: amd64
    replicas: 2
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            component: core
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    revisionHistoryLimit: 0
    existingSecret: "harbor-credentials"
    existingXsrfSecret: "harbor-credentials"

  jobservice:
    nodeSelector:
      kubernetes.io/arch: amd64
    replicas: 2
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            component: jobservice
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    revisionHistoryLimit: 0
    jobLoggers:
      - stdout
    existingSecret: "harbor-credentials"

  registry:
    replicas: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            component: registry
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    revisionHistoryLimit: 0
    existingSecret: "harbor-credentials"
    credentials:
      existingSecret: "harbor-credentials"
    nodeSelector:
      kubernetes.io/arch: amd64

  trivy:
    enabled: true
    replicas: 1
    vulnType: "os,library"
    severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
    insecure: true
    nodeSelector:
      kubernetes.io/arch: amd64

  database:
    type: external
    external:
      host: harbor-postgres-rw
      port: 5432
      username: app
      coreDatabase: app
      existingSecret: harbor-credentials

  redis:
    type: external
    external:
      addr: harbor-redis-ha-haproxy:6379

  exporter:
    nodeSelector:
      kubernetes.io/arch: amd64
    replicas: 2
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            component: exporter
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    revisionHistoryLimit: 0

redis-ha:
  replicas: 3
  haproxy:
    enabled: true
    replicas: 3
  hardAntiAffinity: true
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 40m
      memory: 64Mi
  sentinel:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 40m
        memory: 64Mi
