{{- if and .Values.grafanaMcpBearerAuth.enabled .Values.grafanaMcpBearerAuth.secretInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "grafana-mcp.fullname" . }}-secret-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "grafana-mcp.fullname" . }}-secret-init
      containers:
        - name: bearer-auth-secret-init
          image: "{{ .Values.grafanaMcpBearerAuth.secretInit.image.repository }}:{{ .Values.grafanaMcpBearerAuth.secretInit.image.tag }}"
          imagePullPolicy: IfNotPresent
          resources: {{ toYaml .Values.grafanaMcpBearerAuth.secretInit.resources | nindent 12 }}
          command:
            - sh
            - -c
            - |
              kubectl get secret {{ .Values.grafanaMcpBearerAuth.secretName }} -n {{ .Release.Namespace }} --allow-missing-template-keys=false -o jsonpath="{.data.mcp-client}" >/dev/null 2>&1 || \
              kubectl create secret generic {{ .Values.grafanaMcpBearerAuth.secretName }} -n {{ .Release.Namespace }} --from-literal=mcp-client="$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')"
{{- end }}
