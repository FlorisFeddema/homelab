{{- if and .Values.grafanaMcpOidc.enabled .Values.grafanaMcpOidc.clientSecretSealed }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.grafanaMcpOidc.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    client-secret: {{ .Values.grafanaMcpOidc.clientSecretSealed }}
  template:
    metadata:
      name: {{ .Values.grafanaMcpOidc.secretName }}
      namespace: {{ .Release.Namespace }}
{{- end }}
