{{- $grafanaMcp := index .Values "grafana-mcp" -}}
{{- $oidc := index $grafanaMcp "oidc" -}}
{{- if $oidc.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: grafana-mcp-security-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "grafana-mcp.fullname" . }}
  oidc:
    clientID: {{ required "grafana-mcp.oidc.clientID is required when grafana-mcp.oidc.enabled=true" $oidc.clientID | quote }}
    clientSecret:
      name: {{ required "grafana-mcp.oidc.clientSecret.existingSecret is required when grafana-mcp.oidc.enabled=true" $oidc.clientSecret.existingSecret }}
    provider:
      issuer: {{ required "grafana-mcp.oidc.provider.issuer is required when grafana-mcp.oidc.enabled=true" $oidc.provider.issuer }}
    redirectURL: {{ required "grafana-mcp.oidc.redirectURL is required when grafana-mcp.oidc.enabled=true" $oidc.redirectURL }}
    logoutPath: {{ $oidc.logoutPath | default "/oauth2/logout" }}
{{- end }}
