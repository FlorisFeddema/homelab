{{- $grafanaMcp := index .Values "grafana-mcp" -}}
{{- $oidc := index $grafanaMcp "oidc" -}}
{{- if and $oidc.enabled $oidc.clientSecret.createSealedSecret }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ required "grafana-mcp.oidc.clientSecret.existingSecret is required when grafana-mcp.oidc.clientSecret.createSealedSecret=true" $oidc.clientSecret.existingSecret }}
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    client-secret: {{ required "grafana-mcp.oidc.clientSecret.sealedValue is required when grafana-mcp.oidc.clientSecret.createSealedSecret=true" $oidc.clientSecret.sealedValue }}
  template:
    metadata:
      name: {{ required "grafana-mcp.oidc.clientSecret.existingSecret is required when grafana-mcp.oidc.clientSecret.createSealedSecret=true" $oidc.clientSecret.existingSecret }}
      namespace: {{ .Release.Namespace }}
{{- end }}
