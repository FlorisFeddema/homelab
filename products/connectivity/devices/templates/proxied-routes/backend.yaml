{{- range $route := .Values.proxiedRoutes }}
{{- if $route.backend }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: {{ $route.name }}-proxy
spec:
  endpoints:
    - fqdn:
        hostname: {{ $route.name }}-proxy.{{ $.Release.Namespace }}.svc.cluster.local
        port: 443
  tls:
    insecureSkipVerify: {{ $route.backend.insecureSkipVerify | default false }}
---
{{- end }}
{{- end }}
