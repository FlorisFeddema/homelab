{{- range $route := .Values.proxiedRoutes }}
{{- $publicKeySet := hasKey $route "public" }}
{{- $privateKeySet := hasKey $route "private" }}
{{- if not (or $publicKeySet $privateKeySet) }}
{{- fail (printf "proxiedRoutes[%s] must define at least one of 'public' or 'private'" $route.name) }}
{{- end }}
{{- $enablePublic := default false $route.public }}
{{- $enablePrivate := default false $route.private }}
{{- if not (or $enablePublic $enablePrivate) }}
{{- fail (printf "proxiedRoutes[%s] must enable at least one exposure: 'public' or 'private'" $route.name) }}
{{- end }}
apiVersion: 'gateway.networking.k8s.io/v1'
kind: 'HTTPRoute'
metadata:
  name: {{ $route.name}}-proxy
spec:
  parentRefs:
    {{- if $enablePublic }}
    - name: envoy-gateway-public
      namespace: envoy-gateway
      sectionName: web-https
    {{- end }}
    {{- if $enablePrivate }}
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https
    {{- end }}
  hostnames:
    - {{ $route.name}}.{{ $.Values.domain }}
  rules:
    - backendRefs:
        {{- if $route.backend }}
        - group: gateway.envoyproxy.io
          kind: Backend
          name: {{ $route.name }}-proxy
        {{- else }}
        - name: {{ $route.name }}-proxy
          port: {{ $route.port }}
        {{- end }}
      {{- if $route.auth }}
      filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.envoyproxy.io
          kind: HTTPRouteFilter
          name: {{ $route.name }}-proxy-auth
    {{- end }}
---
{{- end }}
