{{- range $route := .Values.proxiedRoutes }}
apiVersion: 'gateway.networking.k8s.io/v1'
kind: 'HTTPRoute'
metadata:
  name: {{ $route.name}}-proxy
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
      sectionName: web-https
  hostnames:
    - {{ $route.name}}.{{ $.Values.domain }}
  rules:
    - backendRefs:
        {{- if $route.backend }}
        - group: gateway.envoyproxy.io
          kind: Backend
          name: {{ $route.name }}-proxy
        {{- else }}
        - name: {{ $route.name }}-proxy
          port: {{ $route.port }}
        {{- end }}
---
{{- end }}
