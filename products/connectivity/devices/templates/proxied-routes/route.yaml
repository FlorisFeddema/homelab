{{- range $route := .Values.proxiedRoutes }}
apiVersion: 'gateway.networking.k8s.io/v1'
kind: 'HTTPRoute'
metadata:
  name: {{ $route.name}}-proxy
spec:
  parentRefs:
    {{- if $route.public }}
    - name: envoy-gateway-public
      namespace: envoy-gateway
      sectionName: web-https
    {{- end }}
    {{- if $route.private }}
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https
    {{- end }}
  hostnames:
    - {{ $route.name}}.{{ $.Values.domain }}
  rules:
    - backendRefs:
        {{- if $route.backend }}
        - group: gateway.envoyproxy.io
          kind: Backend
          name: {{ $route.name }}-proxy
        {{- else }}
        - name: {{ $route.name }}-proxy
          port: {{ $route.port }}
        {{- end }}
      {{- if $route.auth }}
      filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.envoyproxy.io
          kind: HTTPRouteFilter
          name: {{ $route.name }}-proxy-auth
    {{- end }}
---
{{- end }}
