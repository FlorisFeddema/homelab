{{- range $endpoint := .Values.dnsRecords }}
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: {{ $endpoint.name }}
spec:
  endpoints:
    - dnsName: '{{ $endpoint.name }}.{{ $.Values.domain }}'
      recordType: A
      targets:
        - {{ $endpoint.ip }}
---
{{- end }}
