kind: Certificate
apiVersion: cert-manager.io/v1
metadata:
  name: ai-tls-certificate
spec:
  secretName: ai-tls-certificate
  dnsNames: {{ toYaml .Values.aiTlsCertificate.domains | indent 4 }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-dns
  revisionHistoryLimit: 1
  usages:
    - digital signature
    - key encipherment
