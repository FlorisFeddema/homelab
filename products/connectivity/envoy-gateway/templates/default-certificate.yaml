kind: Certificate
apiVersion: cert-manager.io/v1
metadata:
  name: default-tls-certificate
spec:
  secretName: default-tls-certificate
  dnsNames:
    {{- range $domain := .Values.defaultTlsCertificate.domains }}
    - {{ $domain | quote }}
    {{- end }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-dns
  revisionHistoryLimit: 1
  usages:
    - digital signature
    - key encipherment
