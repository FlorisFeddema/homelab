{{- range $name, $_ := .Values.gateways }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-gateway-{{ $name }}-http-redirect
spec:
  parentRefs:
    - name: envoy-gateway-{{ $name }}
      sectionName: web-http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ $.Values.httpRedirect.statusCode }}
---
{{- end }}
