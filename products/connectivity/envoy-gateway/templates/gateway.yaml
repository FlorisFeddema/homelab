{{- range $name, $gateway := .Values.gateways }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway-{{ $name }}
  labels:
    feddema.dev/exposure: {{ $name | quote }}
spec:
  addresses:
    {{- range $gateway.addresses }}
    - type: IPAddress
      value: {{ . }}
    {{- end }}
  gatewayClassName: envoy-gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy-gateway-{{ $name }}
  listeners:
    - name: web-http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: web-https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: default-tls-certificate
---
{{- end }}
