{{/* Local overlay: upstream does not ship a ServiceMonitor template. */}}
{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-sandbox-controller
  namespace: {{ .Release.Namespace }}
  labels: {{- include "agent-sandbox.labels" . | nindent 4 }}
spec:
  endpoints:
    - port: metrics
  selector:
    matchLabels: {{- include "agent-sandbox.selectorLabels" . | nindent 6 }}
{{- end }}
