gatus-monitor:
  appName: nextcloud
  publicEndpoints:
    - name: nextcloud
  privateEndpoints:
    - name: nextcloud

route:
  enabled: true
  hostnames:
    - nextcloud.feddema.dev
  parentRefs:
    - name: envoy-gateway-public
      namespace: envoy-gateway
      sectionName: web-https
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https

database:
  clusterName: nextcloud-postgres
  size: 8Gi
  replicas: 2

nextcloud:
  replicaCount: 1

  httpRoute:
    enabled: true
    hostnames:
      - nextcloud.feddema.dev
    parentRefs:
      - name: envoy-gateway-public
        namespace: envoy-gateway
        sectionName: web-https
      - name: envoy-gateway-private
        namespace: envoy-gateway
        sectionName: web-https

  phpClientHttpsFix:
    enabled: true

  startupProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 50
    successThreshold: 1

  nextcloud:
    host: nextcloud.feddema.dev

    existingSecret:
      enabled: true
      secretName: nextcloud-credentials
      usernameKey: username
      passwordKey: password

  internalDatabase:
    enabled: false

  externalDatabase:
    enabled: true
    type: postgresql
    host: nextcloud-postgres-rw
    database: app

    existingSecret:
      enabled: true
      secretName: nextcloud-credentials
      usernameKey: postgres-username
      passwordKey: postgres-password

  redis:
    enabled: true
    architecture: standalone

  cronjob:
    enabled: true

  persistence:
    enabled: true
    size: 50Gi
    labels:
      backup.velero.io/include: "true"

  resources:
    limits:
      memory: 700Mi
    requests:
      cpu: 150m
      memory: 350Mi

  metrics:
    enabled: true
    info:
      apps: true

  prometheus:
    serviceMonitor:
      enabled: true

  rbac:
    enabled: true
    serviceaccount:
      create: true
      name: nextcloud-serviceaccount
