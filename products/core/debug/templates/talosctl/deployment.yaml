apiVersion: apps/v1
kind: Deployment
metadata:
  name: talosctl
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: talosctl
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: talosctl
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: talosctl
      containers:
        - name: talosctl
          image: "{{ .Values.talosctl.image.repository }}:{{ .Values.talosctl.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sleep
            - infinity
          volumeMounts:
            - name: talos-secrets
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.talosctl.resources | nindent 12 }}
      volumes:
        - name: talos-secrets
          secret:
            secretName: talosctl-talos-secrets
            defaultMode: 416 # 0640
        - name: tmp
          emptyDir: {}
