apiVersion: apps/v1
kind: Deployment
metadata:
  name: talosctl
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: talosctl
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: talosctl
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: talosctl
      containers:
        - name: talosctl
          image: "{{ .Values.talosctl.image.repository }}:{{ .Values.talosctl.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sleep
            - infinity
          {{- if .Values.talosctl.talosconfig }}
          env:
            - name: TALOSCONFIG
              value: /talos/config
          volumeMounts:
            - name: talosconfig
              mountPath: /talos
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- else }}
          volumeMounts:
            - name: talos-secrets
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- end }}
          resources:
            {{- toYaml .Values.talosctl.resources | nindent 12 }}
      volumes:
        {{- if .Values.talosctl.talosconfig }}
        - name: talosconfig
          secret:
            secretName: talosconfig
        {{- else }}
        - name: talos-secrets
          secret:
            secretName: talosctl-talos-secrets
            defaultMode: 416 # 0640
        {{- end }}
        - name: tmp
          emptyDir: {}
