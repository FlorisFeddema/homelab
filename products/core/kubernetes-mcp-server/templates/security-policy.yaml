{{- if .Values.oidc.enabled -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: kubernetes-mcp-server-security-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kubernetes-mcp-server
  oidc:
    clientID: {{ required "oidc.clientID is required when oidc.enabled=true" .Values.oidc.clientID | quote }}
    clientSecret:
      name: {{ .Values.oidc.secretName }}
    provider:
      issuer: {{ .Values.oidc.issuer }}
    redirectURL: {{ .Values.oidc.redirectURL }}
    logoutPath: {{ .Values.oidc.logoutPath }}
{{- end }}
