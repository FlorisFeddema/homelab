{{- if .Values.argocdMcpOidc.enabled -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: argocd-mcp-server-security-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: argocd-mcp-server
  oidc:
    clientID: {{ required "argocdMcpOidc.clientID is required when argocdMcpOidc.enabled=true" .Values.argocdMcpOidc.clientID | quote }}
    clientSecret:
      name: {{ .Values.argocdMcpOidc.secretName }}
    provider:
      issuer: {{ .Values.argocdMcpOidc.issuer }}
    redirectURL: {{ .Values.argocdMcpOidc.redirectURL }}
    logoutPath: {{ .Values.argocdMcpOidc.logoutPath }}
{{- end }}
