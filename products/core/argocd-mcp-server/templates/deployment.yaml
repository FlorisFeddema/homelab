apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-mcp-server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-mcp-server
    spec:
      automountServiceAccountToken: false
      containers:
        - name: argocd-mcp-server
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - exec npx -y argocd-mcp@{{ .Values.argocdMcp.packageVersion }} http --port {{ .Values.argocdMcp.port }}
          env:
            - name: ARGOCD_BASE_URL
              value: {{ .Values.argocdMcp.baseURL | quote }}
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: ARGOCD_API_TOKEN
            - name: MCP_READ_ONLY
              value: "true"
            - name: HOME
              value: /tmp
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
          ports:
            - name: http
              containerPort: {{ .Values.argocdMcp.port }}
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
