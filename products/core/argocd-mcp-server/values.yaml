argocdMcpBearerAuth:
  enabled: true
  secretInit:
    image:
      repository: alpine/kubectl
      tag: 1.35.3
    resources: {}

route:
  enabled: true
  hostnames:
    - argocd-mcp.feddema.dev
  parentRefs:
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https

secret:
  name: argocd-mcp-server-credentials
  apiTokenSealed: "" # seal an argocd account token for the argocd-mcp user before enabling the product

image:
  repository: node
  tag: 20-slim
  pullPolicy: IfNotPresent

argocdMcp:
  packageVersion: 0.3.0
  baseURL: http://argocd-server.argocd
  port: 3000

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
