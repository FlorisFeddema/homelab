vpa:
  recommender:
    enabled: true
    revisionHistoryLimit: 0
    extraArgs:
      v: "4"
      recommender-interval: 1m
      pod-recommendation-min-cpu-millicores: '10'
      pod-recommendation-min-memory-mb: '10'
      target-cpu-percentile: '0.9'
      target-memory-percentile: '0.9'
      prometheus-address: http://prometheus-thanos-query.prometheus:9090
      storage: prometheus
      history-length: 8d
      history-resolution: 1h
    replicaCount: 2
    podMonitor:
      enabled: true
    resources:
      limits:
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 50Mi
    image:
      repository: registry.k8s.io/autoscaling/vpa-recommender
      tag: "1.6.0"

  updater:
    enabled: true
    revisionHistoryLimit: 0
    replicaCount: 2
    podMonitor:
      enabled: true
    resources:
      limits:
        memory: 120Mi
      requests:
        cpu: 10m
        memory: 50Mi
    image:
      repository: registry.k8s.io/autoscaling/vpa-updater
      tag: "1.6.0"

  admissionController:
    revisionHistoryLimit: 0
    enabled: true
    generateCertificate: true
    registerWebhook: true
    replicaCount: 2
    podMonitor:
      enabled: true
    resources:
      limits:
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 50Mi
    image:
      repository: registry.k8s.io/autoscaling/vpa-admission-controller
      tag: "1.6.0"
