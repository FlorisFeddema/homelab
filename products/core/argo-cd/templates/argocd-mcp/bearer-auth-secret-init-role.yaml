{{- if and .Values.argocdMcp.enabled .Values.argocdMcp.bearerAuth.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-mcp-server-secret-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
{{- end }}
