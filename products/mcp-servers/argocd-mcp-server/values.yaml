gatus-monitor:
  appName: argocd-mcp-server
  privateEndpoints:
    - name: argocd-mcp-server
      url: https://argocd.mcp.feddema.dev/healthz

auth:
  enabled: true
  secretInit:
    image:
      repository: alpine/kubectl
      tag: 1.36.0

route:
  enabled: true
  hostnames:
    - argocd.mcp.feddema.dev
  parentRefs:
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https

apiTokenSealed: ""

image:
  repository: quay.io/argoprojlabs/mcp-for-argocd
  tag: 0.7.0
  pullPolicy: IfNotPresent

server:
  baseURL: http://argocd-server.argocd

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
