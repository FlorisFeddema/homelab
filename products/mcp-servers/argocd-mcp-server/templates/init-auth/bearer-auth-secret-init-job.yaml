{{- if .Values.auth.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-mcp-server-secret-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: argocd-mcp-server-secret-init
      containers:
        - name: bearer-auth-secret-init
          image: "{{ .Values.auth.secretInit.image.repository }}:{{ .Values.auth.secretInit.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              kubectl get secret argocd-mcp-bearer-auth-secret -n {{ .Release.Namespace }} >/dev/null 2>&1 || \
              kubectl create secret generic argocd-mcp-bearer-auth-secret -n {{ .Release.Namespace }} --from-literal=mcp-client="$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')"
{{- end }}
