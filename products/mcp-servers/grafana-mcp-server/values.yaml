gatus-monitor:
  appName: grafana-mcp-server
  privateEndpoints:
    - name: grafana-mcp-server
      url: https://grafana.mcp.feddema.dev/healthz

apiKey: 

auth:
  enabled: true
  secretInit:
    image:
      repository: alpine/kubectl
      tag: 1.35.3

grafana-mcp:
  replicas: 2

  grafana:
    url: https://grafana.feddema.dev
    apiKeySecret:
      name: "mcp-apikey"
      key: "key"

  disabledCategories:
    - incident
    - clickhouse
    - cloudwatch
    - searchlogs
    - elaticsearch
    - oncall
    - sift
    - pyroscope
    - asserts

  metrics:
    enabled: true

  extraArgs:
    - -t
    - streamable-http
    - --disable-write

  serviceMonitor:
    enabled: true

  readinessProbe:
    httpGet:
      path: /healthz
      port: mcp-http
    initialDelaySeconds: 5
    periodSeconds: 10

  livenessProbe:
    httpGet:
      path: /healthz
      port: mcp-http
    initialDelaySeconds: 15
    periodSeconds: 20

  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 128Mi

  route:
    main:
      enabled: true
      hostnames:
        - grafana.mcp.feddema.dev
      parentRefs:
        - name: envoy-gateway-private
          namespace: envoy-gateway
          sectionName: web-https
