gatus-monitor:
  appName: jellyfin
  publicEndpoints:
    - name: jellyfin
  privateEndpoints:
    - name: jellyfin

podSecurityContext: {}
securityContext: {}

mediaPvcName: media-server-media

resources:
  requests:
    cpu: 500m
    memory: 500Mi
  limits:
    memory: 4000Mi
  claims:
    - name: i915

resourceClaims:
  - name: i915
    resourceClaimTemplateName: i915

image:
  registry: ghcr.io
  repository: jellyfin/jellyfin
  tag: 10.11.8

persistence:
  size: 4Gi
  labels:
    backup.velero.io/include: "true"

route:
  enabled: true
  hostnames:
    - jellyfin.feddema.dev
  parentRefs:
    - name: envoy-gateway-public
      namespace: envoy-gateway
      sectionName: web-https
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https
