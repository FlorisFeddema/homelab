gatus-monitor:
  appName: prowlarr
  publicEndpoints:
    - name: prowlarr
  privateEndpoints:
    - name: prowlarr

podSecurityContext:
  fsGroup: 5000

securityContext: {}

resources:
  limits:
    memory: 300Mi
  requests:
    cpu: 20m
    memory: 150Mi

image:
  registry: ghcr.io
  repository: linuxserver/prowlarr
  tag: 2.3.5

persistence:
  size: 1Gi
  labels:
    backup.velero.io/include: "true"

route:
  enabled: true
  hostnames:
    - prowlarr.feddema.dev
  parentRefs:
    - name: envoy-gateway-public
      namespace: envoy-gateway
      sectionName: web-https
    - name: envoy-gateway-private
      namespace: envoy-gateway
      sectionName: web-https
