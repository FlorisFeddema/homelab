machine:
  type: worker

  network:
    interfaces:
      - interface: enp1s0f1 # node
        dhcp: true
      - interface: enp1s0f0 # storage
        dhcp: false
        addresses:
          - 192.168.5.15/24
        routes:
          - network: 192.168.5.0/24
            gateway: 192.168.5.1
        mtu: 9000

  nodeLabels:
    topology.kubernetes.io/zone: "hortek"
    topology.kubernetes.io/region: "salioca"

  install:
    disk: /dev/sda
