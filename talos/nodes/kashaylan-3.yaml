machine:
  type: worker

  network:
    interfaces:
      - interface: end0 # node
        dhcp: true
      - interface: enP1p49s0u2 # storage
        dhcp: false
        addresses:
          - 192.168.5.14/24
        routes:
          - network: 192.168.5.0/24
            gateway: 192.168.5.1
        mtu: 9000

  nodeLabels:
    topology.kubernetes.io/zone: "kashaylan"
    topology.kubernetes.io/region: "salioca"

  install:
    disk: /dev/mmcblk0
